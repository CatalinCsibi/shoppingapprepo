spring:
  application:
    name: shoppingapp
    port: 8090

  datasource:
    url: jdbc:postgresql://localhost:5432/shop_db
    username: cmcsibi
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    clean-disabled: false   # allows you to reset (optional)
  cache:
    type: caffeine

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/shopping-realm

server:
  port: 8090

logging:
  level:
    root: INFO
    com.demo.shoppingapp: DEBUG

app:
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:8080"

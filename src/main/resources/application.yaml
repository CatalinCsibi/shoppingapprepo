spring:
  application:
    name: shoppingapp

  datasource:
    url: jdbc:postgresql://localhost:5433/shop_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    clean-disabled: false   # allows you to reset (optional)
  cache:
    type: caffeine

logging:
  level:
    root: INFO
    com.demo.shoppingapp: DEBUG
